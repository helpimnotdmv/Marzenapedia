<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor — Marzenapedia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Source+Sans+3:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Editor fills full viewport — the modal overlay IS the page */
    body { margin: 0; overflow: hidden; }
    /* Force the editor overlay open and full-screen */
    #editor-overlay {
      display: flex !important;
      position: fixed;
      inset: 0;
      background: var(--bg);
      backdrop-filter: none;
      padding: 0;
      overflow: hidden;
    }
    #editor-overlay .modal {
      max-width: 100%;
      width: 100%;
      height: 100vh;
      margin: 0;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: none;
    }
    #editor-overlay .modal-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }
    #editor-panes {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }
    /* Chromebar at top stays compact */
    #chrome-mount .topbar    { display: none; }
    #chrome-mount .site-header { display: none; }
    #chrome-mount .search-bar  { display: none; }
    #chrome-mount .page-tabs   { display: none; }
  </style>
</head>
<body>
  <div id="chrome-mount"></div>
  <div id="modals-mount"></div>
  <script type="module" src="editor-page.js"></script>
</body>
</html>
